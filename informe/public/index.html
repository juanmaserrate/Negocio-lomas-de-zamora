<!DOCTYPE html>
<html lang="es-AR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Informe interactivo de rutas: zonas, viajes y paradas numeradas (DMC+vianda, comedor, desayuno/merienda, patios). Depósito Burzaco." />
  <meta name="theme-color" content="#0e1219" />
  <meta name="color-scheme" content="dark" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Informe de rutas logísticas" />
  <meta property="og:description" content="Paradas por zona con mapa: DMC+vianda, comedor, desayuno/merienda y patios." />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Informe de rutas logísticas" />
  <meta name="twitter:description" content="Paradas por zona con mapa interactivo." />
  <title>Informe de rutas</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <a class="skip-link" href="#listaZonas">Saltar al listado</a>

  <div class="bg-aurora" aria-hidden="true"></div>

  <div id="appLoader" class="app-loader" aria-live="polite" aria-busy="true">
    <div class="app-loader-inner glass">
      <div class="spinner" aria-hidden="true"></div>
      <p class="app-loader-text">Cargando informe…</p>
    </div>
  </div>

  <header class="glass header">
    <div class="header-inner">
      <h1 class="logo" id="tituloPrincipal">Informe de rutas</h1>
      <p class="tagline" id="subtituloMeta">Cargando…</p>
    </div>
    <div class="segment-stats glass-inner" id="segmentStats" hidden aria-label="Resumen del segmento activo"></div>
    <nav class="segment-nav glass-inner" id="segmentNav" aria-label="Tipo de entrega"></nav>
  </header>

  <main class="layout">
    <section class="glass panel panel-list" aria-label="Listado de zonas y paradas">
      <div id="listaZonas" class="zonas"></div>
    </section>
    <section class="glass panel panel-map" aria-label="Mapa">
      <div id="mapa" role="application" aria-label="Mapa de paradas"></div>
      <div class="map-legend glass-inner" id="mapLegend" role="status"></div>
    </section>
  </main>

  <footer class="footer">
    <span id="pieMeta"></span>
  </footer>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="js/app.js"></script>
</body>
</html>
