# Publica informe/public en GitHub Pages (Settings → Pages → Source: GitHub Actions).
name: Informe — GitHub Pages

on:
  push:
    branches: [main, master]
    paths:
      - "informe/public/**"
      - ".github/workflows/informe-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-informe
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: informe/public
      - id: deployment
        uses: actions/deploy-pages@v4
